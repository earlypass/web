name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  pull-requests: write

jobs:
  screenshot:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Install Playwright
        run: |
          npm install --prefix /tmp playwright
          /tmp/node_modules/.bin/playwright install chromium

      - name: Screenshot landing page
        run: |
          npm run preview &
          timeout 30 bash -c 'until curl -sf http://localhost:4321 > /dev/null; do sleep 1; done'
          NODE_PATH=/tmp/node_modules node scripts/screenshot.cjs

      - id: artifact
        uses: actions/upload-artifact@v4
        with:
          name: landing-page-preview
          path: preview.png

      - name: Update PR description with preview link
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            const artifactUrl = '${{ steps.artifact.outputs.artifact-url }}';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const MARKER_START = '<!-- preview-start -->';
            const MARKER_END = '<!-- preview-end -->';

            const previewSection = [
              MARKER_START,
              '## 📸 Landing Page Preview',
              '',
              `Built from commit \`${sha}\` — [view run](${runUrl}) · [view screenshot](${artifactUrl}).`,
              MARKER_END,
            ].join('\n');

            const { data: pr } = await github.rest.pulls.get({
              ...context.repo,
              pull_number: prNumber,
            });

            const currentBody = pr.body || '';
            const sectionRe = /\n{2}<!-- preview-start -->[\s\S]*?<!-- preview-end -->|<!-- preview-start -->[\s\S]*?<!-- preview-end -->/;
            let newBody;
            if (sectionRe.test(currentBody)) {
              newBody = currentBody.replace(sectionRe, '\n\n' + previewSection);
            } else {
              newBody = currentBody + (currentBody ? '\n\n' : '') + previewSection;
            }

            await github.rest.pulls.update({
              ...context.repo,
              pull_number: prNumber,
              body: newBody,
            });

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Remove preview section from PR description
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const MARKER_START = '<!-- preview-start -->';
            const MARKER_END = '<!-- preview-end -->';

            const { data: pr } = await github.rest.pulls.get({
              ...context.repo,
              pull_number: prNumber,
            });

            const currentBody = pr.body || '';
            if (!currentBody.includes(MARKER_START)) return;

            const sectionRe = /\n{2}<!-- preview-start -->[\s\S]*?<!-- preview-end -->|<!-- preview-start -->[\s\S]*?<!-- preview-end -->/;
            const newBody = currentBody.replace(sectionRe, '').trimEnd();

            await github.rest.pulls.update({
              ...context.repo,
              pull_number: prNumber,
              body: newBody,
            });
