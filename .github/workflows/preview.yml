name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  screenshot:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Install Playwright
        run: |
          npm install --prefix /tmp playwright
          /tmp/node_modules/.bin/playwright install chromium

      - name: Screenshot landing page
        run: |
          npm run preview &
          timeout 30 bash -c 'until curl -sf http://localhost:4321 > /dev/null; do sleep 1; done'
          NODE_PATH=/tmp/node_modules node scripts/screenshot.cjs

      - uses: actions/upload-artifact@v4
        with:
          name: landing-page-preview
          path: preview.png

      - name: Publish screenshot and post comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const prNumber = context.payload.pull_request.number;
            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            const assetName = `pr-${prNumber}.png`;
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            // Find or create the 'pr-previews' release used as an image store
            let release;
            try {
              ({ data: release } = await github.rest.repos.getReleaseByTag({
                ...context.repo,
                tag: 'pr-previews',
              }));
            } catch (e) {
              if (e.status === 404) {
                ({ data: release } = await github.rest.repos.createRelease({
                  ...context.repo,
                  tag_name: 'pr-previews',
                  target_commitish: 'main',
                  name: 'PR Preview Images',
                  body: 'Automated release used as an image store for PR preview screenshots. Do not delete.',
                  prerelease: true,
                }));
              } else throw e;
            }

            // Replace the existing asset for this PR if present
            const existingAsset = release.assets.find(a => a.name === assetName);
            if (existingAsset) {
              await github.rest.repos.deleteReleaseAsset({
                ...context.repo,
                asset_id: existingAsset.id,
              });
            }

            // Upload the new screenshot as a release asset
            const imageData = fs.readFileSync('preview.png');
            const { data: asset } = await github.rest.repos.uploadReleaseAsset({
              ...context.repo,
              release_id: release.id,
              name: assetName,
              data: imageData,
              headers: { 'content-type': 'image/png', 'content-length': imageData.length },
            });

            const imageUrl = asset.browser_download_url;

            const body = [
              '## 📸 Landing Page Preview',
              '',
              `Built from commit \`${sha}\` — [view run](${runUrl}).`,
              '',
              `![Landing page preview](${imageUrl})`,
            ].join('\n');

            // Create or update the bot comment
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(
              c => c.user.type === 'Bot' && c.body.includes('Landing Page Preview')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: prNumber,
                body,
              });
            }

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Remove preview screenshot
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const assetName = `pr-${prNumber}.png`;

            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({
                ...context.repo,
                tag: 'pr-previews',
              });
              const asset = release.assets.find(a => a.name === assetName);
              if (asset) {
                await github.rest.repos.deleteReleaseAsset({
                  ...context.repo,
                  asset_id: asset.id,
                });
              }
            } catch (e) {
              if (e.status !== 404) core.warning(`Could not remove preview asset: ${e.message}`);
            }
